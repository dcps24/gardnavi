<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Oppskrift Detaljer | Gårdnavi</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #faf8f3; padding: 2rem; color: #1a3022; }
        .container { max-width: 700px; margin: 4rem auto; background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 1rem; }
        .category { text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; color: #c8a96e; font-weight: 700; }
        .section-title { border-bottom: 2px solid #f5f0e8; padding-bottom: 0.5rem; margin-top: 2rem; color: #2d5a3d; }
        .back-link { display: inline-block; margin-bottom: 2rem; text-decoration: none; color: #2d5a3d; font-weight: 600; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-family: inherit; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <a href="oppskrifter.html" class="back-link">← Tilbake til alle oppskrifter</a>
        <div id="recipe-content">
            <p class="category" id="cat-display">Laster...</p>
            <h1 id="title-display">Henter oppskrift...</h1>
            
            <h3 class="section-title">Beskrivelse</h3>
            <p id="desc-display"></p>

            <h3 class="section-title">Ingredienser</h3>
            <pre id="ing-display"></pre>

            <h3 class="section-title">Fremgangsmåte</h3>
            <pre id="steps-display"></pre>
        </div>
    </div>

    <script>
        const API = 'https://gardnavi-api-fecufjdrfbhyf2g6.westeurope-01.azurewebsites.net';
        const params = new URLSearchParams(window.location.search);
        const recipeId = params.get('id');

        async function getRecipeDetails() {
            if (!recipeId) return;
            try {
                // IMPORTANT: Your API must support fetching a single ID
                const response = await fetch(`${API}/api/GetRecipe?id=${recipeId}`);
                if (!response.ok) throw new Error("Fant ikke oppskriften");
                
                const r = await response.json();
                
                document.getElementById('title-display').textContent = r.title;
                document.getElementById('cat-display').textContent = r.category || 'Oppskrift';
                document.getElementById('desc-display').textContent = r.description || '';
                document.getElementById('ing-display').textContent = r.ingredients || 'Ingen ingredienser listet.';
                document.getElementById('steps-display').textContent = r.steps || 'Ingen fremgangsmåte listet.';
            } catch (e) {
                document.getElementById('title-display').textContent = "Oppskrift ikke funnet 404";
                console.error(e);
            }
        }
        getRecipeDetails();
    </script>
</body>
</html>
