<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oppskrift Detaljer | Gårdnavi</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --green-dark: #1a3022; --earth: #c8a96e; --warm-white: #faf8f3; }
        body { font-family: 'DM Sans', sans-serif; background: var(--warm-white); padding: 2rem; color: var(--green-dark); line-height: 1.6; }
        .container { max-width: 800px; margin: 2rem auto; background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .category { text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; color: var(--earth); font-weight: 700; margin-bottom: 2rem; display: block; }
        .section-title { border-bottom: 2px solid #f5f0e8; padding-bottom: 0.5rem; margin-top: 2rem; margin-bottom: 1rem; color: #2d5a3d; font-family: 'Playfair Display', serif; }
        .back-link { display: inline-block; margin-bottom: 2rem; text-decoration: none; color: var(--green-dark); font-weight: 600; font-size: 0.9rem; }
        .back-link:hover { color: var(--earth); }
        pre { white-space: pre-wrap; word-wrap: break-word; font-family: 'DM Sans', sans-serif; font-size: 1rem; color: #3d3d2e; }
        .loading { text-align: center; padding: 5rem; font-style: italic; color: var(--earth); }
    </style>
</head>
<body>
    <div class="container">
        <a href="oppskrifter.html" class="back-link">← Tilbake til alle oppskrifter</a>
        
        <div id="loader" class="loading">Henter godbiten fra gården...</div>
        
        <div id="recipe-content" style="display:none;">
            <span class="category" id="cat-display">Kategori</span>
            <h1 id="title-display">Oppskrift Tittel</h1>
            
            <h3 class="section-title">Om retten</h3>
            <p id="desc-display"></p>

            <h3 class="section-title">Ingredienser</h3>
            <pre id="ing-display"></pre>

            <h3 class="section-title">Slik gjør du</h3>
            <pre id="steps-display"></pre>
        </div>
    </div>

    <script>
        // Updated to Norway East
        const API = 'https://gardnavi-api-fecufjdrfbhyf2g6.norwayeast-01.azurewebsites.net';
        
        // Get the ID from the URL (e.g., oppskrift.html?id=5)
        const params = new URLSearchParams(window.location.search);
        const recipeId = params.get('id');

        async function fetchRecipeDetails() {
            if (!recipeId) {
                document.getElementById('loader').textContent = "Ingen oppskrift valgt.";
                return;
            }

            try {
                // Fetch specific recipe by ID from your API
                const response = await fetch(`${API}/api/recipes/${recipeId}`);
                
                if (!response.ok) throw new Error("Oppskrift ikke funnet i databasen.");
                
                const r = await response.json();
                
                // Fill the page with SQL data
                document.getElementById('title-display').textContent = r.title;
                document.getElementById('cat-display').textContent = r.category || 'Oppskrift';
                document.getElementById('desc-display').textContent = r.description || '';
                document.getElementById('ing-display').textContent = r.ingredients || 'Ingen ingredienser listet.';
                document.getElementById('steps-display').textContent = r.steps || 'Fremgangsmåte mangler.';
                
                // Show content, hide loader
                document.getElementById('recipe-content').style.display = 'block';
                document.getElementById('loader').style.display = 'none';

            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerHTML = `
                    <h3>Beklager!</h3>
                    <p>Vi fant ikke denne oppskriften i Azure SQL. Sjekk at ID #${recipeId} eksisterer.</p>
                `;
            }
        }

        fetchRecipeDetails();
    </script>
</body>
</html>
