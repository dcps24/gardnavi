<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oppskrifter | Gårdnavi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--green:#1a3022;--earth:#c8a96e;--cream:#f5f0e8;--white:#faf8f3;--text:#3d3d2e;}
    body{font-family:'DM Sans',sans-serif;background:var(--white);margin:0;color:var(--green);}
    nav{background:var(--cream);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(0,0,0,0.1);}
    .logo{font-family:'Playfair Display',serif;font-size:1.5rem;text-decoration:none;color:var(--green);font-weight:900;}
    .page-header{background:var(--earth);padding:4rem 2rem;text-align:center;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;padding:40px;}
    .card{background:white;border-radius:12px;overflow:hidden;cursor:pointer;transition:transform 0.2s;border:1px solid #eee;}
    .card:hover{transform:translateY(-5px);box-shadow:0 10px 20px rgba(0,0,0,0.05);}
    .card-img{height:150px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:3rem;color:white;}
    .card-body{padding:20px;}
    .card-body h3{margin:0 0 10px 0;font-family:'Playfair Display',serif;}
    .card-body p{font-size:0.9rem;color:var(--text);line-height:1.4;}
  </style>
</head>
<body>
  <nav><a href="index.html" class="logo">Gård<span>navi</span></a></nav>
  <header class="page-header"><h1>Norske Oppskrifter 📖</h1><p>Fra lokale gårder til ditt kjøkken</p></header>
  <div class="grid" id="recipes-container">Laster de ferskeste oppskriftene...</div>

<script>
const API='https://gardnavi-api-fecufjdrfbhyf2g6.norwayeast-01.azurewebsites.net';
let allRecipes=[];

async function loadRecipes(){
  try{
    const r=await fetch(`${API}/api/GetRecipes`);
    if(r.ok){
      allRecipes=await r.json();
      render();
    }
  }catch(e){
    document.getElementById('recipes-container').innerHTML="Kunne ikke koble til Azure SQL.";
  }
}

function render(){
  const el=document.getElementById('recipes-container');
  if(!allRecipes.length) { el.innerHTML="Ingen oppskrifter funnet."; return; }
  
  el.innerHTML=allRecipes.map(r=>`
    <div class="card" onclick="window.location.href='oppskrift.html?id=${r.id}'">
      <div class="card-img">🍲</div>
      <div class="card-body">
        <h3>${r.title}</h3>
        <p>${r.description || ''}</p>
      </div>
    </div>`).join('');
}
loadRecipes();
</script>
</body>
</html>
