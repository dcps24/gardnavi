<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oppskrift Detaljer | Gårdnavi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    body{font-family:'DM Sans',sans-serif;background:#faf8f3;padding:2rem;color:#1a3022;}
    .container{max-width:700px;margin:0 auto;background:white;padding:3rem;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.05);}
    h1{font-family:'Playfair Display',serif;font-size:2.5rem;margin:0 0 1rem 0;}
    .section-title{border-bottom:2px solid #f5f0e8;padding-bottom:10px;margin-top:30px;font-family:'Playfair Display',serif;}
    pre{white-space:pre-wrap;word-wrap:break-word;font-family:inherit;font-size:1.1rem;line-height:1.6;}
    .back{text-decoration:none;color:#c8a96e;font-weight:700;display:block;margin-bottom:20px;}
  </style>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#1a3022"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
</head>
<body>
  <div class="container">
    <a href="oppskrifter.html" class="back">← Tilbake</a>
    <h1 id="title">Henter...</h1>
    <p id="desc" style="font-style:italic;color:#666;"></p>
    <h3 class="section-title">Fremgangsmåte</h3>
    <pre id="steps"></pre>
  </div>

<script>
const API='https://gardnavi-api-fecufjdrfbhyf2g6.norwayeast-01.azurewebsites.net';
const id=new URLSearchParams(window.location.search).get('id');

async function loadDetail(){
  try{
    const r=await fetch(`${API}/api/GetRecipes`);
    const data=await r.json();
    const recipe=data.find(x=>x.id==id);
    if(recipe){
      document.getElementById('title').textContent=recipe.title;
      document.getElementById('desc').textContent=recipe.description;
      document.getElementById('steps').textContent=recipe.steps;
    } else {
      document.getElementById('title').textContent="Vi fant ikke oppskriften.";
    }
  }catch(e){ console.error(e); }
}
loadDetail();
</script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
